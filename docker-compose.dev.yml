# ============================================================
# Docker Compose — Overrides développement local
# ============================================================
# Fusionné automatiquement avec docker-compose.yml via :
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Différences vs production :
#   - Pas de restart automatique (plus facile à stopper)
#   - Port PostgreSQL exposé (accès direct DBeaver/psql)
#   - Logs n8n en mode debug
# ============================================================

services:

  postgres:
    restart: "no"
    ports:
      - "5432:5432"   # Accès direct à la DB (DBeaver, TablePlus, psql...)

  gateway:
    restart: "no"

  n8n-import:
    restart: "no"

  backup:
    restart: "no"

  n8n:
    restart: "no"
    environment:
      - N8N_LOG_LEVEL=debug
