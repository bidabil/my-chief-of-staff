volumes:
  n8n_storage:
  postgres_storage:
  postgres_backup:
  caddy_data:
  caddy_config:

networks:
  chief-of-staff:

x-n8n: &service-n8n
  image: n8nio/n8n:2.13.2
  networks: ['chief-of-staff']
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET}
    # N8N_RUNNERS_ENABLED supprimé — variable dépréciée en n8n 2.13.2 (génère un warning inutile)
  env_file:
    - path: .env
      required: true

services:

  # ─────────────────────────────────────────
  # DATABASE (PostgreSQL + pgvector)
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    container_name: postgres
    networks: ['chief-of-staff']
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # 1MIN GATEWAY (OpenAI-compatible → DeepSeek)
  # https://hub.docker.com/r/billelattafi/1min-gateway/tags
  # ─────────────────────────────────────────
  gateway:
    image: billelattafi/1min-gateway:6c3a581
    hostname: gateway
    container_name: gateway
    networks: ['chief-of-staff']
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - ONE_MIN_AI_API_KEY=${ONE_MIN_AI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5678}
      - PERMIT_MODELS_FROM_SUBSET_ONLY=${PERMIT_MODELS_FROM_SUBSET_ONLY:-False}
      - RATELIMIT_ENABLED=${RATELIMIT_ENABLED:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:5001:5001"
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:5001/\")" 2>/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # N8N — IMPORT (one-shot bootstrap)
  # ─────────────────────────────────────────
  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    restart: "no"  # one-shot bootstrap — ne jamais relancer automatiquement
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        if [ -z "$(n8n list:workflow --onlyId)" ]; then
          n8n import:credentials --separate --input=/demo-data/credentials && \
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows already exist, skipping import"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # N8N — MAIN
  # ─────────────────────────────────────────
  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    user: "1000:1000"
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"  # Accès local uniquement — Caddy est le point d'entrée public
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
    healthcheck:
      # wget --spider : plus robuste que grep sur JSON — ne dépend pas du format exact de la réponse
      # start_period 60s : absorbe le bootstrap DB + workflows, évite les faux négatifs en CI
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--timeout=5", "--spider", "http://localhost:5678/healthz"]
      interval: 10s
      timeout: 8s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────
  # BACKUP (PostgreSQL — daily dumps, 7d/4w/6m rotation)
  # Dumps stored in postgres_backup volume at /backups
  # ─────────────────────────────────────────
  backup:
    image: prodrigestivill/postgres-backup-local:16
    hostname: backup
    container_name: backup
    networks: ['chief-of-staff']
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - BACKUP_ON_START=TRUE
    volumes:
      - postgres_backup:/backups
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # CADDY — TLS reverse proxy (optional)
  # Start with: docker compose --profile tls up -d
  # Requires DOMAIN and ACME_EMAIL in .env
  # ─────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    profiles: ["tls"]
    hostname: caddy
    container_name: caddy
    networks: ['chief-of-staff']
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      n8n:
        condition: service_healthy