name: CI
# Trivy v0.35.0 = Trivy v0.69.3 (post-incident supply chain 01/03/2026)
# https://github.com/aquasecurity/trivy/discussions/10265

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      skip_tests:
        description: "Skip tests (emergency only)"
        type: boolean
        default: false
    outputs:
      version:   { value: "${{ jobs.init.outputs.version }}" }
      sha_short: { value: "${{ jobs.init.outputs.sha_short }}" }
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main"]
    tags: ["v*"]
    paths-ignore: ["**.md", "docs/**", ".github/ISSUE_TEMPLATE/**", "LICENSE"]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  init:
    name: "Initialize"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha_short:      ${{ steps.vars.outputs.sha_short }}
      is_release:     ${{ steps.vars.outputs.is_release }}
      is_main:        ${{ steps.vars.outputs.is_main }}
      is_draft:       ${{ steps.vars.outputs.is_draft }}
      version:        ${{ steps.vars.outputs.version }}
      changes_docker: ${{ steps.changes.outputs.docker }}
      changes_config: ${{ steps.changes.outputs.config }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)"                  >> $GITHUB_OUTPUT
          echo "is_release=${{ startsWith(github.ref, 'refs/tags/v') }}" >> $GITHUB_OUTPUT
          echo "is_main=${{ github.ref == 'refs/heads/main' }}"          >> $GITHUB_OUTPUT
          echo "is_draft=${{ github.event.pull_request.draft }}"         >> $GITHUB_OUTPUT
          if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            docker:
              - 'docker-compose*.yml'
              - '.dockerignore'
            config:
              - 'postgres/**'
              - 'n8n/**'
              - 'shared/**'
              - '.env.example'

  lint:
    name: "Lint"
    needs: init
    if: |
      needs.init.outputs.is_draft != 'true' &&
      (needs.init.outputs.changes_docker == 'true' ||
       needs.init.outputs.changes_config == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        id: cache-tools
        with:
          path: ~/.local/bin
          key: tools-${{ runner.os }}-dotenv-4.0.0

      - if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          sudo apt-get install -y --no-install-recommends jq
          curl -sSL "https://github.com/dotenv-linter/dotenv-linter/releases/download/v4.0.0/dotenv-linter-linux-x86_64.tar.gz" \
            | tar -xz -C ~/.local/bin

      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: docker-compose + no :latest
        run: |
          cp .env.example .env
          docker compose config --quiet
          # :latest forbidden for third-party images — owner's images (billelattafi/) are exempt
          LATEST=$(grep -E "image:.*:latest" docker-compose.yml | grep -v "billelattafi/" || true)
          [ -n "$LATEST" ] && { echo "$LATEST"; echo "❌ :latest forbidden for third-party images"; exit 1; } || true

      - name: Required files & env vars
        run: |
          FAIL=false
          for f in docker-compose.yml .env.example postgres/init.sql; do
            [ -f "$f" ] || { echo "❌ Missing: $f"; FAIL=true; }
          done
          for var in ONE_MIN_AI_API_KEY POSTGRES_PASSWORD N8N_ENCRYPTION_KEY N8N_USER_MANAGEMENT_JWT_SECRET SECRET_KEY; do
            grep -qE "^${var}=" .env.example || { echo "❌ Missing in .env.example: $var"; FAIL=true; }
          done
          [ "$FAIL" = "true" ] && exit 1; true

      - run: dotenv-linter check .env.example

      - name: n8n JSON
        run: |
          FAIL=false
          for dir in n8n/demo-data/workflows n8n/demo-data/credentials; do
            [ -d "$dir" ] || continue
            for f in "$dir"/*.json; do
              [ -f "$f" ] || continue
              jq -e . "$f" > /dev/null || { echo "❌ Invalid JSON: $(basename $f)"; FAIL=true; }
            done
          done
          for WF in n8n/demo-data/workflows/*.json; do
            [ -f "$WF" ] || continue
            for field in name nodes connections; do
              jq -e ".$field" "$WF" > /dev/null || { echo "❌ Missing field '$field' in: $(basename $WF)"; FAIL=true; }
            done
          done
          [ "$FAIL" = "true" ] && exit 1; true

      - name: SQL structure
        run: |
          FAIL=false
          for p in "CREATE EXTENSION.*vector" "CREATE SCHEMA.*memory" "CREATE TABLE.*documents" "USING hnsw"; do
            grep -qE "$p" postgres/init.sql || { echo "❌ Not found: $p"; FAIL=true; }
          done
          [ "$FAIL" = "true" ] && exit 1; true

  secret-scan:
    name: "Secret Scan"
    needs: init
    if: needs.init.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: "Security"
    needs: init
    if: |
      needs.init.outputs.is_draft != 'true' &&
      (needs.init.outputs.changes_docker == 'true' ||
       needs.init.outputs.changes_config == 'true' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type:      'config'
          scan-ref:       '.'
          format:         'sarif'
          output:         'trivy-config.sarif'
          severity:       'CRITICAL,HIGH'
          exit-code:      '1'
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        if: always()
        with:
          sarif_file: 'trivy-config.sarif'

      - uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e  # v12
        with:
          directory:     '.'
          framework:     'secrets'
          output_format: 'cli'
          soft_fail:     false
          quiet:         true

  smoke-test:
    name: "Smoke Test"
    needs: init
    if: |
      needs.init.outputs.is_draft != 'true' &&
      !inputs.skip_tests &&
      (needs.init.outputs.changes_docker == 'true' ||
       needs.init.outputs.changes_config == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Prepare .env
        run: |
          # ── Infrastructure (required for all automations) ──
          printf 'POSTGRES_USER=chief\nPOSTGRES_DB=chief_db\n'                          > .env
          printf 'POSTGRES_PASSWORD=%s\n'                      "$(openssl rand -hex 16)" >> .env
          printf 'N8N_ENCRYPTION_KEY=%s\n'                     "$(openssl rand -hex 16)" >> .env
          printf 'N8N_USER_MANAGEMENT_JWT_SECRET=%s\n'         "$(openssl rand -hex 16)" >> .env
          printf 'WEBHOOK_URL=http://localhost:5678\nCORS_ORIGINS=http://localhost:5678\n' >> .env
          printf 'DOMAIN=localhost\nACME_EMAIL=ci@test.local\n'                          >> .env
          # ── Gateway (required) ──
          printf 'ONE_MIN_AI_API_KEY=ci-test-%s\n'            "$(openssl rand -hex 8)"  >> .env
          printf 'SECRET_KEY=%s\n'                             "$(openssl rand -hex 16)" >> .env
          # ── Automation-specific secrets (optional — placeholder so stack starts) ──
          # Each automation reads its own vars from .env at runtime.
          # Add a placeholder line here for any new REQUIRED var your automation needs.
          printf 'TELEGRAM_BOT_TOKEN=ci-placeholder\nTELEGRAM_CHAT_ID=ci-placeholder\n' >> .env

      # FIX log n8n-import: --wait bloque sur les conteneurs one-shot (Exited 0)
      # les étapes suivantes gèrent elles-mêmes l'attente via retry loops
      - name: Start stack
        run: |
          docker compose pull
          docker compose up -d || { docker compose logs; exit 1; }

      - name: Healthcheck — PostgreSQL
        run: docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-chief}" -d "${POSTGRES_DB:-chief_db}"

      - name: Healthcheck — gateway :5001
        run: |
          for i in $(seq 1 8); do
            curl -sf --max-time 10 --connect-timeout 5 http://localhost:5001/ && exit 0
            sleep $(( 2 ** i > 30 ? 30 : 2 ** i ))
          done
          docker compose logs gateway; exit 1

      - name: Healthcheck — n8n :5678
        run: |
          timeout 300s bash -c '
            until curl -sf --max-time 8 --connect-timeout 5 http://localhost:5678/healthz > /dev/null; do
              echo "n8n not ready yet... waiting"
              sleep 8
            done
            echo "✅ n8n is healthy"
          ' || {
            echo "❌ n8n timeout after 5min"
            docker compose logs n8n --tail=200
            exit 1
          }

      - name: pgvector + memory schema
        run: |
          docker compose exec -T postgres psql -U "${POSTGRES_USER:-chief}" -d "${POSTGRES_DB:-chief_db}" -tAc \
            "SELECT extname FROM pg_extension WHERE extname='vector';" | grep -q vector   || { echo "❌ pgvector missing"; exit 1; }
          docker compose exec -T postgres psql -U "${POSTGRES_USER:-chief}" -d "${POSTGRES_DB:-chief_db}" -tAc \
            "SELECT schema_name FROM information_schema.schemata WHERE schema_name='memory';" | grep -q memory || { echo "❌ memory schema missing"; exit 1; }

      - if: failure()
        run: docker compose logs --no-color

      - if: always()
        run: docker compose down -v --remove-orphans

  quality-gate:
    name: "Quality Gate"
    needs: [lint, secret-scan, security, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: |
          FAIL=false
          check() { local job=$1 r=$2
            [[ "$r" == "failure" || "$r" == "cancelled" ]] && { echo "❌ $job: $r"; FAIL=true; } || echo "✅ $job: $r"
          }
          check lint        "${{ needs.lint.result }}"
          check secret-scan "${{ needs.secret-scan.result }}"
          check security    "${{ needs.security.result }}"
          check smoke-test  "${{ needs.smoke-test.result }}"
          [ "$FAIL" = "true" ] && exit 1; echo "All checks passed or skipped"

  notify:
    name: "Notify"
    needs: [init, lint, secret-scan, security, smoke-test]
    if: |
      always() &&
      (needs.init.outputs.is_main == 'true' || needs.init.outputs.is_release == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Skip silently if Telegram secrets are not configured
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured — skipping notification"
            exit 0
          fi

          L="${{ needs.lint.result }}" S="${{ needs.secret-scan.result }}"
          C="${{ needs.security.result }}" K="${{ needs.smoke-test.result }}"

          # FIX D: security ($C) inclus dans la condition PASSED
          if   [[ "$L" == "failure" || "$S" == "failure" || "$C" == "failure" || "$K" == "failure" ]]; then EMOJI="❌"; STATUS="FAILED"
          elif [[ "$L" == "success" && "$S" != "failure" && "$C" != "failure" && "$K" == "success" ]]; then EMOJI="✅"; STATUS="PASSED"
          else                                                                                               EMOJI="⚠️"; STATUS="PARTIAL"
          fi

          T='`'
          TEXT="${EMOJI} *CI — chief-of-staff*"$'\n'
          TEXT+="Branch: ${T}${{ github.ref_name }}${T} | SHA: ${T}${{ needs.init.outputs.sha_short }}${T}"$'\n'
          TEXT+="Status: ${STATUS}"$'\n'
          TEXT+="[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${TEXT}\",\"parse_mode\":\"Markdown\",\"disable_web_page_preview\":true}")
          [ "$HTTP" = "200" ] && echo "Sent" || echo "HTTP $HTTP (non-blocking)"