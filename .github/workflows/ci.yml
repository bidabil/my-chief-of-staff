# CI Pipeline - Chief of Staff
# Philosophie : fail fast | outils standards | smoke test réel | defense-in-depth
# Trivy v0.35.0 embarque Trivy v0.69.3 (post-incident supply chain 01/03/2026)
# Source : https://github.com/aquasecurity/trivy/discussions/10265

name: CI

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      skip_tests:
        description: "Skip tests (emergency only)"
        type: boolean
        default: false
      upload_artifacts:
        description: "Upload build artifacts"
        type: boolean
        default: true
    outputs:
      version:
        description: "Version built"
        value: ${{ jobs.init.outputs.version }}
      sha_short:
        description: "Short SHA"
        value: ${{ jobs.init.outputs.sha_short }}
  pull_request:
    branches: ["main", "develop"]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
    paths-ignore: ["**.md", "docs/**", ".github/ISSUE_TEMPLATE/**", "LICENSE"]
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  # ── INIT ──────────────────────────────────────────────────────
  init:
    name: "Initialize"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      sha_short:      ${{ steps.vars.outputs.sha_short }}
      is_release:     ${{ steps.vars.outputs.is_release }}
      is_main:        ${{ steps.vars.outputs.is_main }}
      is_pr:          ${{ steps.vars.outputs.is_pr }}
      is_draft:       ${{ steps.vars.outputs.is_draft }}
      version:        ${{ steps.vars.outputs.version }}
      changes_docker: ${{ steps.changes.outputs.docker }}
      changes_ci:     ${{ steps.changes.outputs.ci }}
      changes_config: ${{ steps.changes.outputs.config }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set variables
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)"                       >> $GITHUB_OUTPUT
          echo "is_release=${{ startsWith(github.ref, 'refs/tags/v') }}"      >> $GITHUB_OUTPUT
          echo "is_main=${{ github.ref == 'refs/heads/main' }}"               >> $GITHUB_OUTPUT
          echo "is_pr=${{ github.event_name == 'pull_request' }}"             >> $GITHUB_OUTPUT
          echo "is_draft=${{ github.event.pull_request.draft }}"              >> $GITHUB_OUTPUT
          if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}"                          >> $GITHUB_OUTPUT
          else
            GIT_VERSION=$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short HEAD)
            echo "version=${GIT_VERSION}"                                      >> $GITHUB_OUTPUT
          fi

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36  # v3
        with:
          filters: |
            docker:
              - 'docker-compose*.yml'
              - '.dockerignore'
            ci:
              - '.github/workflows/**'
            config:
              - 'postgres/**'
              - 'n8n/**'
              - 'shared/**'
              - '.env.example'

      - name: Summary
        run: |
          echo "## CI — ${{ steps.vars.outputs.version }} (\`${{ steps.vars.outputs.sha_short }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "| Δ docker | Δ config | Draft |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ steps.changes.outputs.docker }} | ${{ steps.changes.outputs.config }} | ${{ steps.vars.outputs.is_draft }} |" >> $GITHUB_STEP_SUMMARY

  # ── LINT ──────────────────────────────────────────────────────
  lint:
    name: "Lint"
    needs: init
    if: |
      needs.init.outputs.is_draft != 'true' &&
      (needs.init.outputs.changes_docker == 'true' || needs.init.outputs.changes_config == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Cache tools
        id: cache-tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.local/bin
          key: tools-${{ runner.os }}-dotenv-4.0.0

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        env:
          DOTENV_LINTER_VERSION: "4.0.0"
        run: |
          mkdir -p ~/.local/bin
          sudo apt-get install -y --no-install-recommends jq
          curl -sSL "https://github.com/dotenv-linter/dotenv-linter/releases/download/v${DOTENV_LINTER_VERSION}/dotenv-linter-linux-x86_64.tar.gz" \
            | tar -xz -C ~/.local/bin

      - name: Add tools to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: docker-compose + :latest check
        run: |
          docker compose config --quiet
          if grep -qE "image:.*:latest" docker-compose.yml; then
            echo "❌ :latest tag forbidden — pin your image versions"
            grep -E "image:.*:latest" docker-compose.yml
            exit 1
          fi

      - name: Required files & env vars
        run: |
          MISSING=false
          for f in docker-compose.yml .env.example postgres/init.sql; do
            [ -f "$f" ] || { echo "❌ Missing: $f"; MISSING=true; }
          done
          for var in ONE_MIN_AI_API_KEY POSTGRES_PASSWORD N8N_ENCRYPTION_KEY N8N_USER_MANAGEMENT_JWT_SECRET; do
            grep -qE "^${var}=" .env.example || { echo "❌ Missing in .env.example: $var"; MISSING=true; }
          done
          [ "$MISSING" = "true" ] && exit 1

      - name: dotenv-linter
        run: dotenv-linter .env.example

      - name: n8n JSON + schema
        run: |
          FAILED=false
          for dir in n8n/demo-data/workflows n8n/demo-data/credentials; do
            [ -d "$dir" ] || continue
            for f in "$dir"/*.json; do
              [ -f "$f" ] || continue
              jq -e . "$f" > /dev/null 2>&1 || { echo "❌ Invalid JSON: $(basename $f)"; FAILED=true; }
            done
          done
          WF="n8n/demo-data/workflows/morning-briefing.json"
          if [ -f "$WF" ]; then
            for field in name nodes connections; do
              jq -e ".$field" "$WF" > /dev/null 2>&1 || { echo "❌ Missing field: $field"; FAILED=true; }
            done
          fi
          [ "$FAILED" = "true" ] && exit 1

      - name: SQL structure
        run: |
          SQL="postgres/init.sql"
          [ -f "$SQL" ] || { echo "❌ $SQL not found"; exit 1; }
          FAILED=false
          for pattern in "CREATE EXTENSION.*vector" "CREATE SCHEMA.*memory" "CREATE TABLE.*documents" "USING hnsw"; do
            grep -qE "$pattern" "$SQL" || { echo "❌ Not found: $pattern"; FAILED=true; }
          done
          [ "$FAILED" = "true" ] && exit 1

  # ── SECRET SCAN ───────────────────────────────────────────────
  secret-scan:
    name: "Secret Scan"
    needs: init
    if: needs.init.outputs.is_draft != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── SECURITY ──────────────────────────────────────────────────
  security:
    name: "Security"
    needs: init
    if: |
      needs.init.outputs.is_draft != 'true' &&
      (needs.init.outputs.changes_docker == 'true' ||
       needs.init.outputs.changes_config == 'true' ||
       github.event_name == 'schedule')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Trivy config scan
        # v0.35.0 = Trivy v0.69.3, première release post-incident supply chain 01/03/2026
        # Source : https://github.com/aquasecurity/trivy/discussions/10265
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          scan-type:      'config'
          scan-ref:       '.'
          format:         'sarif'
          output:         'trivy-config.sarif'
          severity:       'CRITICAL,HIGH'
          exit-code:      '1'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@dfad8f8ebc168f044d22d94180b54591ef6c0321  # v3
        if: always()
        with:
          sarif_file: 'trivy-config.sarif'

      - name: Checkov
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e  # v12
        with:
          directory:     '.'
          framework:     'secrets,compose'
          output_format: 'cli'
          soft_fail:     false
          quiet:         true

  # ── SMOKE TEST ────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test"
    needs: init
    if: |
      needs.init.outputs.is_draft != 'true' &&
      !inputs.skip_tests &&
      (needs.init.outputs.changes_docker == 'true' || needs.init.outputs.changes_config == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Pull images
        run: |
          docker compose pull || {
            echo "❌ Failed to pull images — check image names and registry access"
            exit 1
          }

      - name: Prepare test .env
        run: |
          printf 'ONE_MIN_AI_API_KEY=ci-test-%s\n'              "$(openssl rand -hex 8)"  > .env
          printf 'POSTGRES_PASSWORD=%s\n'                        "$(openssl rand -hex 16)" >> .env
          printf 'POSTGRES_USER=chief\n'                                                   >> .env
          printf 'POSTGRES_DB=chief_db\n'                                                  >> .env
          printf 'N8N_ENCRYPTION_KEY=%s\n'                       "$(openssl rand -hex 16)" >> .env
          printf 'N8N_USER_MANAGEMENT_JWT_SECRET=%s\n'           "$(openssl rand -hex 16)" >> .env
          printf 'TELEGRAM_BOT_TOKEN=ci-placeholder\n'                                     >> .env
          printf 'WEBHOOK_URL=http://localhost:5678\n'                                     >> .env

      - name: Start stack
        run: docker compose up -d --wait --wait-timeout 120

      - name: Healthcheck — PostgreSQL
        run: docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-chief}" -d "${POSTGRES_DB:-chief_db}"

      - name: Healthcheck — 1min-gateway :5001
        run: |
          for i in $(seq 1 8); do
            curl -sf http://localhost:5001/health > /dev/null 2>&1 && exit 0
            WAIT=$(( 2 ** i > 30 ? 30 : 2 ** i ))
            sleep "$WAIT"
          done
          docker compose logs gateway && exit 1

      - name: Healthcheck — n8n :5678
        run: |
          for i in $(seq 1 10); do
            curl -sf --max-time 10 http://localhost:5678/healthz > /dev/null 2>&1 && exit 0
            WAIT=$(( 2 ** i > 30 ? 30 : 2 ** i ))
            sleep "$WAIT"
          done
          docker compose logs n8n && exit 1

      - name: Verify pgvector + memory schema
        run: |
          RESULT=$(docker compose exec -T postgres psql -U "${POSTGRES_USER:-chief}" -d "${POSTGRES_DB:-chief_db}" \
            -tAc "SELECT extname FROM pg_extension WHERE extname='vector';")
          [ "$RESULT" = "vector" ] || { echo "❌ pgvector not installed"; exit 1; }
          SCHEMA=$(docker compose exec -T postgres psql -U "${POSTGRES_USER:-chief}" -d "${POSTGRES_DB:-chief_db}" \
            -tAc "SELECT schema_name FROM information_schema.schemata WHERE schema_name='memory';")
          [ "$SCHEMA" = "memory" ] || { echo "❌ memory schema not found"; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color > stack-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: stack-logs-${{ needs.init.outputs.sha_short }}
          path: stack-logs.txt
          retention-days: 7

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans

  # ── QUALITY GATE ──────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    needs: [lint, secret-scan, security, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Evaluate results
        run: |
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [secret-scan]="${{ needs.secret-scan.result }}"
            [security]="${{ needs.security.result }}"
            [smoke-test]="${{ needs.smoke-test.result }}"
          )
          FAILED=false
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "❌ $job: $r"
              FAILED=true
            else
              echo "✅ $job: $r"
            fi
          done
          [ "$FAILED" = "true" ] && exit 1 || echo "All checks passed or skipped"

  # ── NOTIFY ────────────────────────────────────────────────────
  notify:
    name: "Notify"
    needs: [init, lint, secret-scan, security, smoke-test]
    if: |
      always() &&
      (needs.init.outputs.is_main == 'true' || needs.init.outputs.is_release == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Build message
        id: msg
        run: |
          LINT="${{ needs.lint.result }}"
          SECRETS="${{ needs.secret-scan.result }}"
          SEC="${{ needs.security.result }}"
          SMOKE="${{ needs.smoke-test.result }}"
          if [[ "$LINT" == "failure" || "$SECRETS" == "failure" || "$SEC" == "failure" || "$SMOKE" == "failure" ]]; then
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "status=FAILED" >> $GITHUB_OUTPUT
          elif [[ "$LINT" == "success" && "$SECRETS" != "failure" && "$SMOKE" == "success" ]]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "status=PARTIAL" >> $GITHUB_OUTPUT
          fi
          echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TICK='`'
          BRANCH="${{ github.ref_name }}"
          SHA="${{ needs.init.outputs.sha_short }}"
          TEXT="${{ steps.msg.outputs.emoji }} *CI — chief-of-staff*"$'\n'
          TEXT+="Branch: ${TICK}${BRANCH}${TICK} | SHA: ${TICK}${SHA}${TICK}"$'\n'
          TEXT+="Status: ${{ steps.msg.outputs.status }}"$'\n'
          TEXT+="[View Run](${{ steps.msg.outputs.run_url }})"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${TEXT}\",\"parse_mode\":\"Markdown\",\"disable_web_page_preview\":true}")
          [ "$HTTP" = "200" ] && echo "Telegram sent" || echo "Telegram HTTP $HTTP (non-blocking)"