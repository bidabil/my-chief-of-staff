name: Dependabot Auto-Merge
# patch (all) + GitHub Actions minor → auto-merge after green CI
# minor (non-Actions) + major → approve only

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  auto-merge:
    name: "Auto-Merge"
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Reject PRs from forks
        if: github.event.pull_request.head.repo.full_name != github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "**Auto-merge disabled:** PR originates from a fork."
          exit 1

      - id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36  # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: wait
        uses: fountainhead/action-wait-for-check@5a908a24814494009c4bb27c242ea38c93c593be  # v1.2.0
        with:
          token:           ${{ secrets.GITHUB_TOKEN }}
          checkName:       "Quality Gate"
          ref:             ${{ github.event.pull_request.head.sha }}
          timeoutSeconds:  1500
          intervalSeconds: 15

      - name: Block if CI fails
        if: steps.wait.outputs.conclusion != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "**CI failed or timed out** (\`${{ steps.wait.outputs.conclusion }}\`) — fix and push to re-trigger."
          exit 1

      - name: Auto-merge patch
        if: |
          steps.wait.outputs.conclusion == 'success' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --approve --body "Auto-approved: patch ✅"
          gh pr merge  "${{ github.event.pull_request.number }}" --auto --squash

      - name: Auto-merge Actions minor
        if: |
          steps.wait.outputs.conclusion == 'success' &&
          steps.metadata.outputs.dependency-type == 'github_actions' &&
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --approve --body "Auto-approved: Actions minor ✅"
          gh pr merge  "${{ github.event.pull_request.number }}" --auto --squash

      - name: Approve minor (no auto-merge)
        if: |
          steps.wait.outputs.conclusion == 'success' &&
          steps.metadata.outputs.dependency-type != 'github_actions' &&
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --approve \
            --body "CI passed — minor update, **manual merge recommended**. 📦 \`${{ steps.metadata.outputs.dependency-names }}\`"

      - name: Approve major (no auto-merge)
        if: |
          steps.wait.outputs.conclusion == 'success' &&
          steps.metadata.outputs.update-type == 'version-update:semver-major'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --approve \
            --body "CI passed — **MAJOR update, manual merge required**. 📦 \`${{ steps.metadata.outputs.dependency-names }}\`
          - [ ] Check breaking changes
          - [ ] Test locally
          - [ ] Merge manually"